<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>RTN SMART — Terminal Test</title>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c27;
    --border: #2a2a3d;
    --accent: #00e5a0;
    --accent2: #0088ff;
    --warn: #ff9500;
    --danger: #ff3b30;
    --text: #f0f0f5;
    --muted: #6b6b80;
    --success: #00e5a0;
  }

- { box-sizing: border-box; margin: 0; padding: 0; }

body {
background: var(–bg);
color: var(–text);
font-family: ‘SF Mono’, ‘Fira Code’, monospace;
font-size: 13px;
min-height: 100vh;
max-width: 480px;
margin: 0 auto;
padding: 16px;
}

header {
text-align: center;
padding: 20px 0 24px;
border-bottom: 1px solid var(–border);
margin-bottom: 20px;
}

header h1 {
font-size: 18px;
font-weight: 700;
color: var(–accent);
letter-spacing: 2px;
text-transform: uppercase;
}

header p {
color: var(–muted);
font-size: 11px;
margin-top: 4px;
letter-spacing: 1px;
}

.step {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 10px;
padding: 16px;
margin-bottom: 14px;
}

.step-header {
display: flex;
align-items: center;
gap: 10px;
margin-bottom: 14px;
}

.step-num {
width: 26px;
height: 26px;
border-radius: 50%;
background: var(–accent);
color: #000;
font-weight: 800;
font-size: 12px;
display: flex;
align-items: center;
justify-content: center;
flex-shrink: 0;
}

.step-title {
font-size: 12px;
font-weight: 700;
color: var(–text);
letter-spacing: 1px;
text-transform: uppercase;
}

label {
display: block;
color: var(–muted);
font-size: 10px;
letter-spacing: 1px;
text-transform: uppercase;
margin-bottom: 5px;
margin-top: 10px;
}

label:first-of-type { margin-top: 0; }

input, select {
width: 100%;
background: var(–surface2);
border: 1px solid var(–border);
border-radius: 7px;
color: var(–text);
font-family: ‘SF Mono’, ‘Fira Code’, monospace;
font-size: 13px;
padding: 10px 12px;
outline: none;
transition: border-color 0.2s;
-webkit-appearance: none;
}

input:focus, select:focus {
border-color: var(–accent);
}

input::placeholder { color: var(–muted); }

.invoice-row {
display: flex;
gap: 8px;
align-items: flex-end;
}

.invoice-row input { flex: 1; }

.btn-regen {
background: var(–surface2);
border: 1px solid var(–border);
border-radius: 7px;
color: var(–muted);
font-size: 16px;
padding: 10px 12px;
cursor: pointer;
flex-shrink: 0;
}

.btn-main {
width: 100%;
background: var(–accent);
border: none;
border-radius: 10px;
color: #000;
font-family: ‘SF Mono’, ‘Fira Code’, monospace;
font-size: 14px;
font-weight: 800;
letter-spacing: 2px;
padding: 16px;
cursor: pointer;
text-transform: uppercase;
margin-top: 8px;
transition: opacity 0.2s, transform 0.1s;
-webkit-appearance: none;
}

.btn-main:active { transform: scale(0.98); opacity: 0.9; }
.btn-main:disabled { opacity: 0.4; }

.btn-main.loading {
background: var(–surface2);
color: var(–accent);
border: 1px solid var(–accent);
}

/* TIP MODE PILLS */
.tip-pills {
display: flex;
gap: 8px;
flex-wrap: wrap;
}

.tip-pill {
flex: 1;
min-width: 80px;
background: var(–surface2);
border: 1px solid var(–border);
border-radius: 7px;
color: var(–muted);
font-family: ‘SF Mono’, ‘Fira Code’, monospace;
font-size: 11px;
padding: 8px 6px;
cursor: pointer;
text-align: center;
transition: all 0.15s;
-webkit-appearance: none;
}

.tip-pill.active {
background: #001a12;
border-color: var(–accent);
color: var(–accent);
font-weight: 700;
}

/* DEBUG PANEL */
#debug-panel {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 10px;
margin-top: 20px;
display: none;
}

#debug-panel.visible { display: block; }

.debug-header {
display: flex;
align-items: center;
justify-content: space-between;
padding: 12px 16px;
border-bottom: 1px solid var(–border);
cursor: pointer;
}

.debug-title {
font-size: 11px;
font-weight: 700;
letter-spacing: 1.5px;
text-transform: uppercase;
color: var(–accent2);
}

.debug-toggle { color: var(–muted); font-size: 11px; }

.debug-body { padding: 0; }

.debug-section {
border-bottom: 1px solid var(–border);
padding: 12px 16px;
}

.debug-section:last-child { border-bottom: none; }

.debug-section-title {
font-size: 10px;
font-weight: 700;
letter-spacing: 1.5px;
text-transform: uppercase;
margin-bottom: 8px;
}

.debug-section-title.pre { color: #888; }
.debug-section-title.req { color: var(–accent2); }
.debug-section-title.res { color: var(–accent); }
.debug-section-title.diag { color: var(–warn); }
.debug-section-title.raw { color: var(–muted); }

.debug-kv {
display: flex;
justify-content: space-between;
align-items: flex-start;
gap: 8px;
margin-bottom: 4px;
font-size: 11px;
}

.debug-k { color: var(–muted); flex-shrink: 0; }
.debug-v { color: var(–text); text-align: right; word-break: break-all; }
.debug-v.ok { color: var(–success); font-weight: 700; }
.debug-v.err { color: var(–danger); font-weight: 700; }
.debug-v.warn { color: var(–warn); }

.diagnosis-box {
background: #1a0e00;
border: 1px solid var(–warn);
border-radius: 7px;
padding: 10px 12px;
font-size: 11px;
line-height: 1.6;
color: #ffcc80;
}

.diagnosis-box.success-box {
background: #001a0e;
border-color: var(–success);
color: #80ffc8;
}

.raw-pre {
background: var(–surface2);
border: 1px solid var(–border);
border-radius: 7px;
padding: 10px;
font-size: 10px;
color: var(–muted);
overflow-x: auto;
white-space: pre-wrap;
word-break: break-all;
max-height: 200px;
overflow-y: auto;
line-height: 1.5;
}

.btn-copy {
background: var(–surface2);
border: 1px solid var(–border);
border-radius: 6px;
color: var(–muted);
font-family: ‘SF Mono’, ‘Fira Code’, monospace;
font-size: 10px;
padding: 5px 10px;
cursor: pointer;
margin-top: 8px;
letter-spacing: 0.5px;
}

.btn-copy.copied { color: var(–accent); border-color: var(–accent); }

.status-badge {
display: inline-block;
padding: 2px 8px;
border-radius: 4px;
font-size: 10px;
font-weight: 700;
letter-spacing: 1px;
}

.badge-ok { background: #001a0e; color: var(–success); border: 1px solid var(–success); }
.badge-err { background: #1a0000; color: var(–danger); border: 1px solid var(–danger); }
.badge-warn { background: #1a0e00; color: var(–warn); border: 1px solid var(–warn); }

.spinner {
display: inline-block;
width: 12px;
height: 12px;
border: 2px solid var(–border);
border-top-color: var(–accent);
border-radius: 50%;
animation: spin 0.7s linear infinite;
vertical-align: middle;
margin-right: 6px;
}

@keyframes spin { to { transform: rotate(360deg); } }

footer {
text-align: center;
padding: 20px 0;
color: var(–muted);
font-size: 10px;
letter-spacing: 0.5px;
}
</style>

</head>
<body>

<header>
  <h1>RTN SMART</h1>
  <p>PAX A80 · CLOUD EMV · XPLOR PAY</p>
</header>

<!-- STEP 1: CREDENTIALS -->

<div class="step">
  <div class="step-header">
    <div class="step-num">1</div>
    <div class="step-title">Credentials</div>
  </div>
  <label>Gateway</label>
  <select id="gateway" onchange="updateGateway()">
    <option value="https://gateway-int.clearent.net">INT / Test</option>
    <option value="https://gateway-sb.clearent.net">Sandbox</option>
    <option value="https://gateway.clearent.net">Production</option>
    <option value="http://localhost:5050">Localhost (CORS proxy)</option>
    <option value="custom">Custom URL…</option>
  </select>
  <div id="custom-url-row" style="display:none; margin-top:8px;">
    <input type="url" id="custom-url" placeholder="https://..." />
  </div>
  <label>Access Key</label>
  <input type="text" id="access-key" placeholder="Your Xplor AccessKey" autocomplete="off" />
  <label>Merchant ID</label>
  <input type="text" id="merchant-id" placeholder="Your MerchantId" autocomplete="off" />
</div>

<!-- STEP 2: TERMINAL -->

<div class="step">
  <div class="step-header">
    <div class="step-num">2</div>
    <div class="step-title">Terminal</div>
  </div>
  <label>Terminal Alias</label>
  <input type="text" id="terminal-alias" value="FC1" autocomplete="off" />
  <label>Tip Mode</label>
  <div class="tip-pills">
    <button class="tip-pill active" onclick="setTip('on_terminal', this)">On Terminal</button>
    <button class="tip-pill" onclick="setTip('no_tip', this)">No Tip</button>
    <button class="tip-pill" onclick="setTip('on_receipt', this)">On Receipt</button>
  </div>
</div>

<!-- STEP 3: AMOUNT -->

<div class="step">
  <div class="step-header">
    <div class="step-num">3</div>
    <div class="step-title">Amount</div>
  </div>
  <label>Amount (USD) — min $1.00 in test</label>
  <input type="number" id="amount" value="1.00" min="0.01" step="0.01" />
  <label>Invoice Number</label>
  <div class="invoice-row">
    <input type="text" id="invoice" readonly />
    <button class="btn-regen" onclick="genInvoice()" title="Regenerate">↺</button>
  </div>
</div>

<!-- STEP 4: SEND -->

<div class="step">
  <div class="step-header">
    <div class="step-num">4</div>
    <div class="step-title">Send</div>
  </div>
  <button class="btn-main" id="btn-send" onclick="sendSale()">⚡ WAKE TERMINAL</button>
</div>

<!-- DEBUG PANEL -->

<div id="debug-panel">
  <div class="debug-header" onclick="toggleDebug()">
    <div class="debug-title">🔍 Debug Report</div>
    <div class="debug-toggle" id="debug-toggle">▼ OPEN</div>
  </div>
  <div class="debug-body" id="debug-body">

```
<div class="debug-section">
  <div class="debug-section-title pre">① Pre-flight</div>
  <div id="dbg-preflight"></div>
</div>

<div class="debug-section">
  <div class="debug-section-title req">② Request</div>
  <div id="dbg-request"></div>
</div>

<div class="debug-section">
  <div class="debug-section-title res">③ Response</div>
  <div id="dbg-response"></div>
</div>

<div class="debug-section">
  <div class="debug-section-title diag">④ Diagnosis</div>
  <div id="dbg-diagnosis"></div>
</div>

<div class="debug-section">
  <div class="debug-section-title raw">⑤ Raw Payload</div>
  <pre class="raw-pre" id="dbg-raw">—</pre>
  <button class="btn-copy" id="btn-copy" onclick="copyRaw()">COPY RAW</button>
</div>
```

  </div>
</div>

<footer>RTN SMART Debug Standard v1.0 · PAX A80</footer>

<script>
  let tipMode = 'on_terminal';
  let debugOpen = true;

  // ─── Init ────────────────────────────────────────────
  genInvoice();

  function genInvoice() {
    const now = new Date();
    const pad = n => String(n).padStart(2, '0');
    const ts = `${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}-${pad(now.getHours())}${pad(now.getMinutes())}${pad(now.getSeconds())}`;
    document.getElementById('invoice').value = `RTN${ts}`;
  }

  function setTip(mode, el) {
    tipMode = mode;
    document.querySelectorAll('.tip-pill').forEach(p => p.classList.remove('active'));
    el.classList.add('active');
  }

  function updateGateway() {
    const val = document.getElementById('gateway').value;
    document.getElementById('custom-url-row').style.display = val === 'custom' ? 'block' : 'none';
  }

  function getGatewayUrl() {
    const sel = document.getElementById('gateway').value;
    if (sel === 'custom') return document.getElementById('custom-url').value.trim();
    return sel;
  }

  function toggleDebug() {
    debugOpen = !debugOpen;
    document.getElementById('debug-body').style.display = debugOpen ? 'block' : 'none';
    document.getElementById('debug-toggle').textContent = debugOpen ? '▲ CLOSE' : '▼ OPEN';
  }

  // ─── KV helper ───────────────────────────────────────
  function kv(k, v, cls='') {
    return `<div class="debug-kv"><span class="debug-k">${k}</span><span class="debug-v ${cls}">${v}</span></div>`;
  }

  // ─── DIAGNOSIS ───────────────────────────────────────
  function diagnose(httpStatus, code, message) {
    const diags = {
      '000': { ok: true,  msg: '✅ Payment approved! Card charged successfully.' },
      '001': { ok: false, msg: '❌ Terminal communication error.\n1. Check PAX A80 is powered on\n2. Check LAN cable is connected\n3. Verify terminal alias matches Xplor dashboard exactly\n4. Confirm Clearent idle screen is showing (not Android home)\n5. Wait 30 sec and retry' },
      '018': { ok: false, msg: '❌ Invalid card security code.\n→ Use sandbox test card: 4111111111111111\n→ Any future expiry date\n→ Any 3-digit CVV' },
      '073': { ok: false, msg: '❌ System error — credentials likely wrong.\n1. Double-check AccessKey (copy from Xplor dashboard)\n2. Double-check MerchantId\n3. Make sure you are on the correct gateway (INT vs Sandbox vs Prod)' },
      '401': { ok: false, msg: '❌ Unauthorized.\n→ Wrong AccessKey or MerchantId\n→ Re-copy both from Xplor Pay dashboard' },
      '402': { ok: false, msg: '❌ Declined.\n→ In test/INT mode, amount must be ≥ $1.00\n→ Current amount may be too low' },
      '404': { ok: false, msg: '❌ Not found.\n→ Wrong gateway URL or API path\n→ Check the selected gateway matches your account type' },
      '500': { ok: false, msg: '❌ Xplor server error.\n→ Retry in 2-3 minutes\n→ Check https://status.xplorpay.com' },
      'CORS': { ok: false, msg: '❌ CORS blocked by browser.\n1. Run: python3 rtn_proxy.py\n2. Switch gateway to "Localhost (CORS proxy)"\n3. Retry' },
      'NETWORK': { ok: false, msg: '❌ Network error — could not reach gateway.\n1. Check your internet connection\n2. If on desktop, try running rtn_proxy.py for CORS\n3. Check gateway URL is correct' },
    };

    if (httpStatus === 401) return diags['401'];
    if (httpStatus === 404) return diags['404'];
    if (httpStatus === 500) return diags['500'];
    if (code && diags[code]) return diags[code];
    if (message && message.toLowerCase().includes('cors')) return diags['CORS'];
    if (httpStatus === 0) return diags['NETWORK'];
    return { ok: false, msg: `Unknown result code: ${code}\nHTTP status: ${httpStatus}\nMessage: ${message}` };
  }

  // ─── MAIN SEND ───────────────────────────────────────
  async function sendSale() {
    const btn = document.getElementById('btn-send');
    const panel = document.getElementById('debug-panel');

    // Collect inputs
    const gateway   = getGatewayUrl();
    const accessKey = document.getElementById('access-key').value.trim();
    const merchantId= document.getElementById('merchant-id').value.trim();
    const alias     = document.getElementById('terminal-alias').value.trim();
    const amount    = parseFloat(document.getElementById('amount').value).toFixed(2);
    const invoice   = document.getElementById('invoice').value.trim();

    // ① PRE-FLIGHT
    const preChecks = [];
    let preOk = true;
    const chk = (label, ok, fix) => {
      preChecks.push({ label, ok, fix });
      if (!ok) preOk = false;
    };
    chk('Gateway URL',    !!gateway,    'Select a gateway or enter custom URL');
    chk('Access Key',     !!accessKey,  'Enter your Xplor AccessKey');
    chk('Merchant ID',    !!merchantId, 'Enter your MerchantId');
    chk('Terminal Alias', !!alias,      'Enter terminal alias (e.g. FC1)');
    chk('Amount ≥ $1.00', parseFloat(amount) >= 1.00, 'Amount must be at least $1.00 in test mode');
    chk('Invoice',        !!invoice,    'Invoice cannot be empty');

    let preHtml = '';
    for (const c of preChecks) {
      preHtml += kv(c.label,
        c.ok ? '✅ OK' : `❌ ${c.fix}`,
        c.ok ? 'ok' : 'err');
    }
    document.getElementById('dbg-preflight').innerHTML = preHtml;

    if (!preOk) {
      panel.classList.add('visible');
      debugOpen = true;
      document.getElementById('debug-body').style.display = 'block';
      document.getElementById('dbg-request').innerHTML = kv('Status', 'Blocked — fix pre-flight errors above', 'err');
      document.getElementById('dbg-response').innerHTML = kv('Status', 'Not sent', 'warn');
      document.getElementById('dbg-diagnosis').innerHTML = '<div class="diagnosis-box">Fix the pre-flight errors above before sending.</div>';
      document.getElementById('dbg-raw').textContent = 'Request not sent.';
      return;
    }

    // ② REQUEST
    const endpoint = `${gateway}/rest/v2/terminal/transactions/sale`;
    const body = {
      amount: amount,
      'invoice-number': invoice,
      'terminal-alias': alias,
      'tip-mode': tipMode,
      currency: 'USD'
    };
    const headers = {
      'Content-Type': 'application/json',
      'AccessKey': accessKey,
      'MerchantId': merchantId
    };

    const t0 = Date.now();

    document.getElementById('dbg-request').innerHTML =
      kv('Method', 'POST') +
      kv('Endpoint', endpoint) +
      kv('AccessKey', accessKey.substring(0,6) + '••••••') +
      kv('MerchantId', merchantId) +
      kv('Body', JSON.stringify(body));

    // Show loading state
    btn.disabled = true;
    btn.classList.add('loading');
    btn.innerHTML = '<span class="spinner"></span>WAITING FOR CARD…';
    panel.classList.add('visible');

    // ③ FETCH
    let httpStatus = 0, resultCode = '', resultMsg = '', rawText = '';
    try {
      const resp = await fetch(endpoint, {
        method: 'POST',
        headers: headers,
        body: JSON.stringify(body)
      });
      httpStatus = resp.status;
      rawText = await resp.text();
      const timing = Date.now() - t0;

      let json = null;
      try { json = JSON.parse(rawText); } catch(e) {}

      resultCode = json?.['result-code'] || json?.['payload']?.['result-code'] || '';
      resultMsg  = json?.['result-message'] || json?.['payload']?.['result-message'] || rawText.substring(0,80);

      // Response section
      document.getElementById('dbg-response').innerHTML =
        kv('HTTP Status', httpStatus, httpStatus === 200 ? 'ok' : 'err') +
        kv('Timing', `${timing}ms`) +
        kv('Result Code', resultCode || '—', resultCode === '000' ? 'ok' : 'err') +
        kv('Result Message', resultMsg) +
        (json?.['transaction-id'] ? kv('Transaction ID', json['transaction-id'], 'ok') : '') +
        (json?.['auth-code']      ? kv('Auth Code',      json['auth-code'],      'ok') : '') +
        (json?.['last-four']      ? kv('Last Four',      json['last-four']            ) : '') +
        (json?.['card-type']      ? kv('Card Type',      json['card-type']            ) : '');

    } catch(err) {
      const timing = Date.now() - t0;
      rawText = err.toString();
      resultCode = 'NETWORK';
      resultMsg  = err.message;
      httpStatus = 0;

      document.getElementById('dbg-response').innerHTML =
        kv('HTTP Status', 'N/A — Network Error', 'err') +
        kv('Timing', `${timing}ms`) +
        kv('Error', err.message, 'err');
    }

    // ④ DIAGNOSIS
    const d = diagnose(httpStatus, resultCode, resultMsg);
    const diagBox = `<div class="diagnosis-box ${d.ok ? 'success-box' : ''}">${d.msg.replace(/\n/g, '<br>')}</div>`;
    document.getElementById('dbg-diagnosis').innerHTML = diagBox;

    // ⑤ RAW
    try {
      document.getElementById('dbg-raw').textContent = JSON.stringify(JSON.parse(rawText), null, 2);
    } catch(e) {
      document.getElementById('dbg-raw').textContent = rawText || '(empty response)';
    }

    // Reset button
    btn.disabled = false;
    btn.classList.remove('loading');
    btn.innerHTML = d.ok ? '✅ APPROVED — SEND ANOTHER' : '⚡ RETRY';

    // Auto-open on failure
    if (!d.ok) {
      debugOpen = true;
      document.getElementById('debug-body').style.display = 'block';
      document.getElementById('debug-toggle').textContent = '▲ CLOSE';
    }

    // Regenerate invoice for next run
    if (d.ok) genInvoice();
  }

  // ─── COPY RAW ────────────────────────────────────────
  function copyRaw() {
    const text = document.getElementById('dbg-raw').textContent;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById('btn-copy');
      btn.textContent = '✅ COPIED';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = 'COPY RAW';
        btn.classList.remove('copied');
      }, 2000);
    });
  }
</script>
